<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Maranata</title>

    <script>
    if (sessionStorage.getItem('logado_maranata') !== 'true') {
        window.location.href = "login.html";
    }
    if (sessionStorage.getItem('perfil_maranata') !== 'admin') {
        alert("Acesso restrito ao Administrador!");
        window.location.href = "index.html";
    }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-red: #ff3131;
            --neon-yellow: #ffca28;
            --bg-card: #161616;
            --border-color: #2c2c2c;
        }

        body { 
            background-color: #000000; 
            color: #ffffff; 
            padding-bottom: 50px; 
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        .navbar-custom { border-bottom: 3px solid var(--neon-blue); background-color: #000 !important; }
        .card-relatorio { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 15px; }
        .text-yellow { color: var(--neon-yellow) !important; }
        .text-blue { color: var(--neon-blue) !important; }
        .text-red { color: var(--neon-red) !important; }

        .table { color: #ffffff !important; vertical-align: middle; border-collapse: separate; border-spacing: 0 5px; }
        .table-dark { --bs-table-bg: transparent; }
        tbody tr { background-color: var(--bg-card); }
        tbody td { border: none !important; padding: 8px !important; }
        tbody td:first-child { border-radius: 8px 0 0 8px; border-left: 4px solid var(--neon-blue) !important; }
        
        .td-nome { font-weight: 800; color: #ffffff !important; display: block; font-size: 0.95rem; }
        .td-detalhes { font-size: 0.7rem; color: #888 !important; text-transform: uppercase; }
        .badge-grupo-rel { color: var(--neon-yellow) !important; font-weight: bold; margin-right: 8px; }

        .dia-tag { 
            display: inline-flex; 
            background: #000 !important; 
            border: 1.5px solid #333 !important; 
            padding: 2px 8px; 
            border-radius: 15px; 
            margin: 2px; 
            font-size: 0.7rem; 
            align-items: center;
            font-weight: 600;
        }
        .tag-p { border-color: var(--neon-blue) !important; }
        .tag-f { border-color: var(--neon-red) !important; }
        .tag-fj { border-color: var(--neon-yellow) !important; }

        .print-only-header { display: none; }

        /* --- CONFIGURAÇÃO DA FOLHA A4 IMPRESSA --- */
        @media print {
            @page { size: portrait; margin: 0.8cm; }
            
            /* Força a impressão das cores e bordas */
            * { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                color-adjust: exact !important;
            }

            body { background-color: #ffffff !important; color: #000000 !important; padding: 0 !important; }
            .print-only-header { display: block !important; text-align: center; border-bottom: 2px solid #000; margin-bottom: 20px; padding-bottom: 10px; }
            .print-only-header h4 { font-weight: bold; margin: 0; color: #000; }
            .print-only-header p { font-size: 0.8rem; margin: 5px 0 0 0; color: #333; }
            .navbar, .card-relatorio, .btn-print-hide { display: none !important; }

            /* Quadrantes: Grade de separação entre membros */
            .table { 
                width: 100% !important; 
                border-collapse: collapse !important; 
                border: 1px solid #000 !important; 
                color: #000 !important; 
            }
            .table thead th { background-color: #f0f0f0 !important; color: #000 !important; border: 1px solid #000 !important; font-size: 0.85rem; padding: 10px !important;}
            tbody tr { background-color: #fff !important; }
            
            /* Separação visual por quadrantes em cada membro */
            tbody td { 
                padding: 12px 8px !important; 
                border: 1px solid #444 !important; 
                color: #000 !important; 
            }
            
            .td-nome { color: #000 !important; font-size: 0.95rem !important; font-weight: bold !important; }
            .td-detalhes { color: #333 !important; }
            .badge-grupo-rel { color: #000 !important; border: 1.5px solid #000; padding: 0 4px; border-radius: 4px; }

            /* Cores Neon nos Status na Impressão */
            .dia-tag { 
                background-color: #fff !important; 
                border-width: 2px !important; 
                border-style: solid !important;
                margin: 2px !important; 
                padding: 3px 8px !important; 
                font-size: 0.7rem !important; 
            }
            .tag-p { border-color: var(--neon-blue) !important; }
            .tag-f { border-color: var(--neon-red) !important; }
            .tag-fj { border-color: var(--neon-yellow) !important; }

            .text-blue { color: #007bff !important; font-weight: bold !important; }
            .text-red { color: #dc3545 !important; font-weight: bold !important; }
            .text-yellow { color: #856404 !important; font-weight: bold !important; }
        }
    </style>
</head>
<body>

<div class="print-only-header">
    <h4>IGREJA CRISTÃ MARANATA - RELATÓRIO MENSAL / DIÁRIO</h4>
    <p>Data de Emissão: <span id="dataRelatorioPrint"></span></p>
</div>

<nav class="navbar navbar-dark bg-black sticky-top navbar-custom p-3 btn-print-hide">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold"><i class="bi bi-file-earmark-bar-graph-fill text-info me-2"></i>RELATÓRIO</span>
        <div>
            <button onclick="prepararPrint()" class="btn btn-success btn-sm me-2 fw-bold"><i class="bi bi-printer-fill"></i> IMPRIMIR</button>
            <a href="index.html" class="btn btn-outline-light btn-sm fw-bold">VOLTAR</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card card-relatorio p-4 mb-4 btn-print-hide">
        <div class="row g-3">
            <div class="col-12">
                <label class="small text-info fw-bold mb-1">MEMBRO:</label>
                <select id="selectMembro" class="form-select">
                    <option value="GERAL">RELATÓRIO GERAL (Membros com Função)</option>
                </select>
            </div>
            <div class="col-4">
                <label class="small text-info fw-bold mb-1">DIA:</label>
                <select id="selectDia" class="form-select">
                    <option value="TODOS">TODOS</option>
                    </select>
            </div>
            <div class="col-4">
                <label class="small text-info fw-bold mb-1">MÊS:</label>
                <select id="selectMes" class="form-select">
                    <option value="01">Janeiro</option><option value="02">Fevereiro</option>
                    <option value="03" selected>Março</option><option value="04">Abril</option>
                    <option value="05">Maio</option><option value="06">Junho</option>
                    <option value="07">Julho</option><option value="08">Agosto</option>
                    <option value="09">Setembro</option><option value="10">Outubro</option>
                    <option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
            </div>
            <div class="col-4">
                <label class="small text-info fw-bold mb-1">ANO:</label>
                <select id="selectAno" class="form-select">
                    <option value="2025">2025</option><option value="2026" selected>2026</option>
                </select>
            </div>
        </div>
        <div class="mt-4">
            <button id="btnBuscar" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">GERAR RELATÓRIO</button>
        </div>
    </div>

    <div id="resultadoRelatorio">
        <div id="listaHistorico" class="table-responsive">
            <p class="text-center text-white-50 p-5">Selecione os filtros e gere o relatório.</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEMfA8_6LAbvanYwXE_6KcO0WQWoI5nSQ",
        authDomain: "chamada-membros.firebaseapp.com",
        projectId: "chamada-membros",
        storageBucket: "chamada-membros.firebasestorage.app",
        messagingSenderId: "787711011979",
        appId: "1:787711011979:web:0fa4c2efa8c4a2f2feb88e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const selectDia = document.getElementById('selectDia');
    for(let i=1; i<=31; i++) {
        let diaStr = i < 10 ? '0' + i : i;
        selectDia.innerHTML += `<option value="${diaStr}">${diaStr}</option>`;
    }

    window.prepararPrint = () => {
        document.getElementById('dataRelatorioPrint').innerText = new Date().toLocaleString('pt-BR');
        window.print();
    };

    async function carregarMembros() {
        const q = query(collection(db, "membros"), orderBy("nome", "asc"));
        const snap = await getDocs(q);
        const select = document.getElementById('selectMembro');
        snap.forEach(docSnap => {
            const m = docSnap.data();
            if(m.funcoes && m.funcoes.length > 0) {
                select.innerHTML += `<option value="${m.nome}">${m.nome}</option>`;
            }
        });
    }

    document.getElementById('btnBuscar').onclick = async () => {
        const tipoBusca = document.getElementById('selectMembro').value;
        const diaFiltro = document.getElementById('selectDia').value;
        const mes = document.getElementById('selectMes').value;
        const ano = document.getElementById('selectAno').value;
        const listaDiv = document.getElementById('listaHistorico');

        listaDiv.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-info"></div></div>';

        const colecoes = ["chamada_diaria", "chamada_EBD", "chamada_NOITE"];
        let registrosPorMembro = {};

        for (const colName of colecoes) {
            const snapP = await getDocs(collection(db, colName));
            snapP.forEach(docSnap => {
                const d = docSnap.data();
                if (!d.data) return;
                const [dAno, dMes, dDia] = d.data.split('-');
                
                if (dMes === mes && dAno === ano && (diaFiltro === "TODOS" || dDia === diaFiltro)) {
                    if (!registrosPorMembro[d.nome]) registrosPorMembro[d.nome] = {};
                    let sufixo = "";
                    let ordemPeriodo = "0"; 
                    if(colName === "chamada_EBD") { sufixo = " (EBD)"; ordemPeriodo = "1"; }
                    if(colName === "chamada_NOITE") { sufixo = " (NOITE)"; ordemPeriodo = "2"; }
                    if (colName === "chamada_diaria" && dDia === "01") return;
                    const chaveUnica = dDia + sufixo;
                    registrosPorMembro[d.nome][chaveUnica] = {
                        dia: dDia, periodo: sufixo, status: d.status, sortKey: dDia + ordemPeriodo
                    };
                }
            });
        }

        const qM = query(collection(db, "membros"), orderBy("nome", "asc"));
        const snapM = await getDocs(qM);

        let html = `<table class="table table-dark">
                    <thead><tr><th style="width: 30%;">MEMBRO / FUNÇÕES</th><th style="width: 70%;">HISTÓRICO</th></tr></thead><tbody>`;
        let count = 0;

        snapM.forEach(mDoc => {
            const m = mDoc.data();
            if ((tipoBusca === "GERAL" || m.nome === tipoBusca) && m.funcoes && m.funcoes.length > 0) {
                const historicoDict = registrosPorMembro[m.nome] || {};
                const historicoMembro = Object.values(historicoDict);
                if (historicoMembro.length > 0) {
                    count++;
                    let tags = "";
                    historicoMembro.sort((a, b) => a.sortKey.localeCompare(b.sortKey));
                    historicoMembro.forEach(reg => {
                        let corClasse = 'text-white';
                        let tagClasse = '';
                        let abrev = reg.status ? reg.status[0] : "?";
                        if(reg.status === 'Presente') { corClasse = 'text-blue'; tagClasse = 'tag-p'; }
                        if(reg.status === 'Ausente') { corClasse = 'text-red'; tagClasse = 'tag-f'; abrev = 'F'; }
                        if(reg.status === 'Justificada') { corClasse = 'text-yellow'; tagClasse = 'tag-fj'; abrev = 'FJ'; }
                        tags += `<span class="dia-tag ${tagClasse}"><b class="${corClasse}">${abrev}</b>&nbsp;${reg.dia}${reg.periodo}</span>`;
                    });
                    html += `<tr>
                                <td>
                                    <span class="td-nome">${m.nome}</span>
                                    <div class="td-detalhes">
                                        <span class="badge-grupo-rel">${m.grupo || 'SEM'}</span>
                                        <span>• ${m.funcoes.join(', ')}</span>
                                    </div>
                                </td>
                                <td>${tags}</td>
                            </tr>`;
                }
            }
        });

        if (count === 0) {
            listaDiv.innerHTML = '<p class="text-center p-5">Nenhum registro encontrado para este filtro.</p>';
        } else {
            listaDiv.innerHTML = html + "</tbody></table>";
        }
    };
    carregarMembros();
</script>
</body>
</html>
