<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chamada Maranata</title>

    <script>
    if (sessionStorage.getItem('logado_maranata') !== 'true') {
        window.location.href = "login.html";
    }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #121212;
            --modal-claro: #1c1c1c;
            --primary-blue: #0d6efd;
            --danger-red: #ff4444;
            --warning-yellow: #ffca28;
            --text-white: #ffffff;
            --input-bg: #3d3d3d;
            --success-green: #28a745;
            --info-cyan: #17a2b8;
        }

        body { background-color: var(--bg-dark); color: var(--text-white); padding-bottom: 220px; font-family: sans-serif; }
        .user-logged-info { background: var(--primary-blue); color: white; font-size: 0.75rem; text-align: center; padding: 4px; font-weight: bold; text-transform: uppercase; }
        .header-data { background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--primary-blue); text-align: center; }
        .data-texto { font-size: 1.1rem; font-weight: bold; color: var(--warning-yellow); margin: 0; }
        .retroativo-container { background: #111; padding: 8px; border-bottom: 1px solid #333; display: none; align-items: center; justify-content: center; gap: 10px; }
        .input-retroativo { background: #333; color: white; border: 1px solid var(--primary-blue); border-radius: 5px; padding: 2px 8px; font-size: 0.85rem; }
        .periodo-selector { background: #222; padding: 10px; border-bottom: 1px solid #333; display: none; justify-content: center; gap: 10px; }
        .btn-periodo { border: 1px solid var(--primary-blue); color: var(--primary-blue); background: transparent; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .btn-periodo.active { background: var(--primary-blue); color: white; }
        
        .nav-tabs { border-bottom: 1px solid #333; justify-content: center; background: #000; }
        .nav-link { color: #888 !important; border: none !important; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; padding: 12px 15px; }
        .nav-link.active { color: var(--primary-blue) !important; background: transparent !important; border-bottom: 3px solid var(--primary-blue) !important; }

        .member-card { background-color: var(--card-bg); border: 1px solid #333; margin: 8px 12px; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; }
        .member-main-row { display: flex; align-items: center; width: 100%; gap: 10px; }
        .photo-frame { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary-blue); overflow: hidden; flex-shrink: 0; background: #222; display: flex; align-items: center; justify-content: center; position: relative; }
        .photo-frame i { font-size: 1.8rem; color: #555; position: absolute; z-index: 1; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; display: none; }
        
        .member-info { flex: 1; min-width: 0; }
        .member-name { font-size: 0.9rem; font-weight: bold; color: var(--text-white); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tag-container { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-top: 4px; }
        .badge-grupo { background-color: var(--warning-yellow); color: #000; font-size: 0.6rem; font-weight: bold; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
        .badge-funcao { font-size: 0.6rem; color: var(--primary-blue); text-transform: uppercase; border: 1px solid var(--primary-blue); padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        
        .btn-call { width: 40px; height: 38px; border: 1px solid #444; background: transparent; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn-p { color: var(--primary-blue); border-color: var(--primary-blue); border-radius: 6px 0 0 6px; }
        .btn-f { color: var(--danger-red); border-color: var(--danger-red); border-radius: 0; }
        .btn-fj { color: var(--warning-yellow); border-color: var(--warning-yellow); border-radius: 0 6px 6px 0; }
        .btn-p.active { background-color: var(--primary-blue) !important; color: white !important; }
        .btn-f.active { background-color: var(--danger-red) !important; color: white !important; }
        .btn-fj.active { background-color: var(--warning-yellow) !important; color: black !important; }
        .btn-edit { color: #555; border: none; background: transparent; font-size: 1.1rem; cursor: pointer; }
        
        .navbar-custom { background-color: #000 !important; border-top: 1px solid #222; z-index: 1100; }
        .admin-only { display: none; }
        .bottom-save-bar { position: fixed; bottom: 65px; left: 0; width: 100%; padding: 10px; background: #1a1a1a; border-top: 1px solid #333; z-index: 1050; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .modal-content { background-color: var(--modal-claro) !important; border: 2px solid var(--primary-blue) !important; border-radius: 15px !important; color: var(--text-white) !important; }

        .gestao-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; margin: 10px; padding: 15px; }
        .gestao-nome { color: var(--warning-yellow); font-weight: bold; font-size: 1rem; margin-bottom: 5px; display: block; }
        .gestao-label { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: block; }
        .btn-group-dizimo { display: flex; gap: 5px; margin-bottom: 12px; }
        .btn-dz { flex: 1; font-size: 0.6rem; font-weight: bold; padding: 8px 2px; border-radius: 6px; border: 1px solid #444; background: #222; color: #777; transition: 0.2s; }
        .btn-dz.active-ok { background: var(--success-green); color: white; border-color: var(--success-green); }
        .btn-dz.active-no { background: var(--danger-red); color: white; border-color: var(--danger-red); }
        .btn-dz.active-sr { background: var(--info-cyan); color: white; border-color: var(--info-cyan); }
        
        .status-ok { color: var(--success-green) !important; font-weight: bold; }
        .status-no { color: var(--danger-red) !important; font-weight: bold; }
        .status-sr { color: var(--info-cyan) !important; font-weight: bold; }
        .status-null { color: #666 !important; font-style: italic; }

        .report-table { font-size: 0.75rem; color: white; width: 100%; border-collapse: collapse; }
        .report-table th { color: var(--warning-yellow); border-bottom: 1px solid #444; padding: 5px; }
        .report-table td { padding: 5px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="user-logged-info">
    <i class="bi bi-person-fill"></i> <span id="labelPerfilUser"></span> | <i class="bi bi-calendar3"></i> <span id="dataTopo"></span>
</div>

<div class="retroativo-container admin-only" id="containerFiltroData">
    <span class="small fw-bold text-info">LANCAR RETROATIVO:</span>
    <input type="date" id="inputDataChamada" class="input-retroativo">
</div>

<div class="header-data">
    <p id="exibirData" class="data-texto"></p>
    <p class="small text-white-50 m-0">CHAMADA MARANATA</p>
</div>

<div id="seletorDomingo" class="periodo-selector">
    <button id="btnEBD" class="btn-periodo" onclick="mudarPeriodo('EBD')">MANHA (EBD)</button>
    <button id="btnNOITE" class="btn-periodo" onclick="mudarPeriodo('NOITE')">CULTO A NOITE</button>
</div>

<ul class="nav nav-tabs sticky-top" id="maranataTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#comFuncao" type="button">Com Funcao</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#semFuncao" type="button">Geral</button></li>
    <li class="nav-item admin-only"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#gestaoTab" type="button">Gestao</button></li>
</ul>

<div class="tab-content" id="maranataTabContent">
    <div class="tab-pane fade show active" id="comFuncao" role="tabpanel"><div id="listaComFuncao" class="mt-2"></div></div>
    <div class="tab-pane fade" id="semFuncao" role="tabpanel"><div id="listaSemFuncao" class="mt-2"></div></div>
    
    <div class="tab-pane fade" id="gestaoTab" role="tabpanel">
        <div class="p-3 text-center">
            <h6 class="text-warning small fw-bold mb-3">CONTROLE DE DIZIMOS E SEMINARIOS</h6>
            <div class="d-flex gap-2 justify-content-center mb-3">
                <select id="filtroMesDizimo" class="form-select form-select-sm bg-dark text-white border-secondary" style="width: 120px;">
                    <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03" selected>Marco</option>
                    <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                    <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                    <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
                <select id="filtroAnoDizimo" class="form-select form-select-sm bg-dark text-white border-secondary" style="width: 90px;">
                    <option value="2025">2025</option><option value="2026" selected>2026</option>
                </select>
                <button class="btn btn-primary btn-sm" onclick="window.recarregarGestao()">OK</button>
            </div>
            <button class="btn btn-warning btn-sm fw-bold w-100 mb-2" onclick="window.abrirRelatorioGestao()">
                <i class="bi bi-file-earmark-pdf"></i> GERAR RELATORIO PDF
            </button>
        </div>
        <div id="listaGestao"></div>
    </div>
</div>

<div class="bottom-save-bar">
    <button id="btnFinalizarChamada" class="btn btn-success w-75 fw-bold shadow">
        <i class="bi bi-check-circle-fill"></i> FINALIZAR CHAMADA
    </button>
</div>

<div class="modal fade" id="modalEditarMembro" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editNomeMembro">Gerenciar Registro</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="admin-only">
                    <label class="small mb-1">Mudar Grupo:</label>
                    <div class="input-group mb-3">
                        <input type="text" id="inputMudarGrupo" class="form-control">
                        <button id="btnSalvarGrupo" class="btn btn-success btn-sm">SALVAR</button>
                    </div>
                    <label class="small mb-1">Adicionar Nova Funcao:</label>
                    <div class="input-group mb-2">
                        <input type="text" id="inputNovaFuncao" class="form-control" placeholder="EX: SOM, OBREIRO">
                        <button id="btnAddFuncao" class="btn btn-primary btn-sm">ADD</button>
                    </div>
                    <div id="containerTagsFuncao" class="d-flex flex-wrap gap-1 mb-3"></div>
                </div>
                <button id="btnLimparChamadaDia" class="btn btn-outline-warning btn-sm w-100 mb-2">LIMPAR CHAMADA DESTE MEMBRO</button>
                <button id="btnExcluirMembro" class="btn btn-outline-danger btn-sm w-100 admin-only">EXCLUIR DEFINITIVAMENTE</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalRelatorioGestao" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-warning">Relatorio Administrativo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <button class="btn btn-danger btn-sm mb-3 fw-bold" onclick="window.baixarRelatorioPDF()">BAIXAR PDF</button>
                <div class="table-responsive">
                    <table class="report-table" id="tabelaGestaoPDF">
                        <thead><tr><th>Membro</th><th>Funcao</th><th>Dizimo</th><th>Seminarios</th></tr></thead>
                        <tbody id="corpoRelatorioGestao"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<nav class="navbar fixed-bottom navbar-custom py-2">
    <div class="container d-flex justify-content-around">
        <a href="index.html" class="text-primary text-center text-decoration-none"><i class="bi bi-people-fill fs-4 d-block"></i><span style="font-size: 0.7rem;">Chamada</span></a>
        <a href="#" onclick="sessionStorage.clear(); window.location.href='login.html';" class="text-danger text-center text-decoration-none"><i class="bi bi-box-arrow-right fs-4 d-block"></i><span style="font-size: 0.7rem;">Sair</span></a>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove, query, orderBy, getDocs, where, deleteField } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEMfA8_6LAbvanYwXE_6KcO0WQWoI5nSQ",
        authDomain: "chamada-membros.firebaseapp.com",
        projectId: "chamada-membros",
        storageBucket: "chamada-membros.firebasestorage.app",
        messagingSenderId: "787711011979",
        appId: "1:787711011979:web:0fa4c2efa8c4a2f2feb88e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const dataHoje = new Date();
    let dataSelecionadaISO = dataHoje.toISOString().split('T')[0];
    const perfil = sessionStorage.getItem('perfil_maranata');
    let periodoAtual = "";
    let cacheMembros = [];

    const limparTexto = (s) => s ? s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\./g, "").toUpperCase() : "";

    window.proximaTentativaDeFoto = function(img) {
        const lista = JSON.parse(img.dataset.tentativas || "[]");
        let idx = parseInt(img.dataset.idx || "0");
        if (idx < lista.length - 1) {
            idx++;
            img.dataset.idx = idx;
            img.src = `fotos/${lista[idx]}`;
        } else { img.style.display = 'none'; }
    };

    function gerarTentativasDeFoto(nome, fotoNoBanco) {
        const t = [];
        if(fotoNoBanco) t.push(limparTexto(fotoNoBanco));
        const limpo = limparTexto(nome);
        const partes = limpo.split(" ");
        t.push(limpo + ".jpg");
        if(partes.length > 1) t.push(partes[0] + " " + partes[partes.length-1] + ".jpg");
        t.push(partes[0] + ".jpg");
        return [...new Set(t)];
    }

    function atualizarLabelsData(dataISO) {
        const d = new Date(dataISO + 'T12:00:00');
        document.getElementById('dataTopo').innerText = d.toLocaleDateString('pt-BR');
        document.getElementById('exibirData').innerText = limparTexto(d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' }));
        const ehDom = d.getDay() === 0;
        document.getElementById('seletorDomingo').style.display = ehDom ? 'flex' : 'none';
        if(ehDom && !periodoAtual) mudarPeriodo('EBD');
    }

    onSnapshot(query(collection(db, "membros"), orderBy("nome", "asc")), (snap) => {
        const listaCom = document.getElementById('listaComFuncao');
        const listaSem = document.getElementById('listaSemFuncao');
        const listaGestao = document.getElementById('listaGestao');
        listaCom.innerHTML = ""; listaSem.innerHTML = ""; listaGestao.innerHTML = "";
        
        const mes = document.getElementById('filtroMesDizimo').value;
        const ano = document.getElementById('filtroAnoDizimo').value;
        const cDiz = `${mes}_${ano}`;
        
        cacheMembros = [];
        snap.forEach(docSnap => {
            const m = docSnap.data(); cacheMembros.push(m);
            const idM = m.nome.replace(/\s+/g, '');
            const temF = (m.funcoes && m.funcoes.length > 0);
            const t = gerarTentativasDeFoto(m.nome, m.foto);
            
            const card = `<div class="member-card"><div class="member-main-row"><button class="btn-edit" onclick="window.abrirEditor('${m.nome}')"><i class="bi bi-pencil-square"></i></button><div class="photo-frame"><i class="bi bi-person-circle"></i><img src="fotos/${t[0]}" data-tentativas='${JSON.stringify(t)}' data-idx="0" onerror="window.proximaTentativaDeFoto(this)" onload="this.style.display='block';"></div><div class="member-info"><span class="member-name">${limparTexto(m.nome)}</span><div class="tag-container">${m.grupo?`<span class="badge-grupo">${limparTexto(m.grupo)}</span>`:''}${m.funcoes?m.funcoes.map(f=>`<span class="badge-funcao">${limparTexto(f)}</span>`).join(''):''}</div></div><div class="d-flex" id="group-${idM}"><button onclick="prepararChamada('${m.nome}','P')" class="btn-call btn-p">P</button><button onclick="prepararChamada('${m.nome}','F')" class="btn-call btn-f">F</button><button onclick="prepararChamada('${m.nome}','FJ')" class="btn-call btn-fj">FJ</button></div></div></div>`;
            
            if(temF) listaCom.innerHTML += card; else listaSem.innerHTML += card;

            if(perfil==='admin'){
                const s = m.historicoDizimos ? m.historicoDizimos[cDiz] : null;
                listaGestao.innerHTML += `<div class="gestao-card"><span class="gestao-nome">${limparTexto(m.nome)}</span><span class="gestao-label">DIZIMO (${mes}/${ano})</span><div class="btn-group-dizimo">
                    <button onclick="window.setDizimo('${m.nome}','${cDiz}','OK', this)" class="btn-dz ${s==='OK'?'active-ok':''}">OFERTADO</button>
                    <button onclick="window.setDizimo('${m.nome}','${cDiz}','PENDENTE', this)" class="btn-dz ${s==='PENDENTE'?'active-no':''}">NAO OFERTADO</button>
                    <button onclick="window.setDizimo('${m.nome}','${cDiz}','SEM_RENDA', this)" class="btn-dz ${s==='SEM_RENDA'?'active-sr':''}">SEM RENDA</button>
                </div><div id="sems-${idM}">${m.historicoSeminarios?.map((sem, i)=>`<div class="sem-item-gestao"><span>${limparTexto(sem.titulo)} <small class="text-white-50">(${sem.mesAno})</small></span> <i class="bi bi-trash text-danger" style="cursor:pointer" onclick="window.delSem('${m.nome}',${i})"></i></div>`).join('')||''}</div><div class="input-group input-group-sm mt-2"><input type="text" id="in-sem-${idM}" class="form-control bg-dark text-white border-secondary" placeholder="Adicionar Curso"><button class="btn btn-warning" onclick="window.addSem('${m.nome}')">+</button></div></div>`;
            }

            if (window.membroSendoEditado === m.nome) {
                document.getElementById('containerTagsFuncao').innerHTML = (m.funcoes || []).map(f => `<span class="badge-funcao">${limparTexto(f)} <i class="bi bi-x-circle-fill text-danger ms-2" style="cursor:pointer" onclick="window.removerFuncao('${f}')"></i></span>`).join('');
                document.getElementById('inputMudarGrupo').value = limparTexto(m.grupo) || "";
            }
        });
    });

    window.setDizimo = async (n, c, v, btn) => {
        const parent = btn.parentElement;
        const estaAtivo = btn.classList.contains('active-ok') || btn.classList.contains('active-no') || btn.classList.contains('active-sr');

        if (estaAtivo) {
            // DESMARCAR: Se ja estava marcado e clicou de novo
            parent.querySelectorAll('.btn-dz').forEach(b => b.classList.remove('active-ok', 'active-no', 'active-sr'));
            await updateDoc(doc(db, "membros", n), { [`historicoDizimos.${c}`]: deleteField() });
        } else {
            // MARCAR: Comportamento normal
            parent.querySelectorAll('.btn-dz').forEach(b => b.classList.remove('active-ok', 'active-no', 'active-sr'));
            if(v === 'OK') btn.classList.add('active-ok');
            if(v === 'PENDENTE') btn.classList.add('active-no');
            if(v === 'SEM_RENDA') btn.classList.add('active-sr');
            await updateDoc(doc(db, "membros", n), { [`historicoDizimos.${c}`]: v });
        }
    };

    window.addSem = async (n) => {
        const id = n.replace(/\s+/g, '');
        const val = limparTexto(document.getElementById(`in-sem-${id}`).value);
        const mes = document.getElementById('filtroMesDizimo').value;
        const ano = document.getElementById('filtroAnoDizimo').value;
        if(val) await updateDoc(doc(db, "membros", n), { 
            historicoSeminarios: arrayUnion({ titulo: val, mesAno: `${mes}/${ano}`, data: new Date().toISOString() }) 
        });
        document.getElementById(`in-sem-${id}`).value = "";
    };

    window.abrirRelatorioGestao = () => {
        const m = document.getElementById('filtroMesDizimo').value, a = document.getElementById('filtroAnoDizimo').value, c = `${m}_${a}`;
        const corpo = document.getElementById('corpoRelatorioGestao'); corpo.innerHTML = "";
        cacheMembros.forEach(mem => {
            const statusBanco = mem.historicoDizimos?.[c];
            let statusTexto = "NAO INFORMADO", classeStatus = "status-null";
            if(statusBanco === "OK") { statusTexto = "OFERTADO"; classeStatus = "status-ok"; }
            else if(statusBanco === "PENDENTE") { statusTexto = "NAO OFERTADO"; classeStatus = "status-no"; }
            else if(statusBanco === "SEM_RENDA") { statusTexto = "SEM RENDA"; classeStatus = "status-sr"; }
            const sems = mem.historicoSeminarios?.map(s => `${limparTexto(s.titulo)} (${s.mesAno})`).join(', ') || '-';
            corpo.innerHTML += `<tr><td>${limparTexto(mem.nome)}</td><td>${mem.funcoes?.map(f=>limparTexto(f)).join(', ')}</td><td><span class="${classeStatus}">${statusTexto}</span> <span style="color:#888">(${m}/${a})</span></td><td>${sems}</td></tr>`;
        });
        new bootstrap.Modal(document.getElementById('modalRelatorioGestao')).show();
    };

    window.baixarRelatorioPDF = () => {
        const m = document.getElementById('filtroMesDizimo').value, a = document.getElementById('filtroAnoDizimo').value;
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.text(`Relatorio de Gestao - Periodo ${m}/${a}`, 14, 15);
        docPDF.autoTable({ 
            head: [['Membro', 'Funcoes', 'Dizimo', 'Seminarios']], 
            body: cacheMembros.map(mem => {
                const statusBanco = mem.historicoDizimos?.[m+'_'+a];
                let statusTexto = "NAO INFORMADO";
                if(statusBanco === "OK") statusTexto = "OFERTADO";
                else if(statusBanco === "PENDENTE") statusTexto = "NAO OFERTADO";
                else if(statusBanco === "SEM_RENDA") statusTexto = "SEM RENDA";
                return [limparTexto(mem.nome), mem.funcoes?.map(f=>limparTexto(f)).join(', ') || '-', `${statusTexto} (${m}/${a})`, mem.historicoSeminarios?.map(s => `${limparTexto(s.titulo)} (${s.mesAno})`).join(', ') || '-'];
            }),
            didParseCell: function(data) {
                if(data.column.index === 2) {
                    if(data.cell.text[0].includes('OFERTADO') && !data.cell.text[0].includes('NAO')) data.cell.styles.textColor = [40, 167, 69];
                    else if(data.cell.text[0].includes('NAO OFERTADO')) data.cell.styles.textColor = [255, 68, 68];
                    else if(data.cell.text[0].includes('SEM RENDA')) data.cell.styles.textColor = [23, 162, 184];
                    else data.cell.styles.textColor = [120, 120, 120];
                }
            },
            startY: 20
        });
        docPDF.save(`Gestao_Maranata_${m}_${a}.pdf`);
    };

    window.abrirEditor = async (nome) => {
        window.membroSendoEditado = nome;
        const m = cacheMembros.find(x => x.nome === nome);
        if(m) {
            document.getElementById('editNomeMembro').innerText = limparTexto(nome);
            document.getElementById('inputMudarGrupo').value = limparTexto(m.grupo) || "";
            document.getElementById('containerTagsFuncao').innerHTML = (m.funcoes || []).map(f => `<span class="badge-funcao">${limparTexto(f)} <i class="bi bi-x-circle-fill text-danger ms-2" style="cursor:pointer" onclick="window.removerFuncao('${f}')"></i></span>`).join('');
        }
        new bootstrap.Modal(document.getElementById('modalEditarMembro')).show();
    };

    window.removerFuncao = async (f) => { if(confirm(`Remover ${f}?`)) await updateDoc(doc(db, "membros", window.membroSendoEditado), { funcoes: arrayRemove(f) }); };
    document.getElementById('btnSalvarGrupo').onclick = async () => { await updateDoc(doc(db, "membros", window.membroSendoEditado), { grupo: document.getElementById('inputMudarGrupo').value.toUpperCase() }); alert("SALVO!"); };
    document.getElementById('btnAddFuncao').onclick = async () => { const f = limparTexto(document.getElementById('inputNovaFuncao').value); if(f) await updateDoc(doc(db, "membros", window.membroSendoEditado), { funcoes: arrayUnion(f) }); document.getElementById('inputNovaFuncao').value = ""; };
    
    window.prepararChamada = (nome, s) => {
        const id = nome.replace(/\s+/g, '');
        const container = document.getElementById(`group-${id}`);
        container.querySelectorAll('.btn-call').forEach(b => b.classList.remove('active'));
        if(s==='P') container.querySelector('.btn-p').classList.add('active');
        if(s==='F') container.querySelector('.btn-f').classList.add('active');
        if(s==='FJ') container.querySelector('.btn-fj').classList.add('active');
    };

    window.mudarPeriodo = (p) => { periodoAtual = p; };
    window.recarregarGestao = () => { window.location.reload(); };
    document.getElementById('inputDataChamada').onchange = (e) => { dataSelecionadaISO = e.target.value; atualizarLabelsData(dataSelecionadaISO); };
    if (perfil === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    atualizarLabelsData(dataSelecionadaISO);
</script>
</body>
</html>
