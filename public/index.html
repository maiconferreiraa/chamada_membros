<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chamada Maranata</title>

    <script>
    if (sessionStorage.getItem('logado_maranata') !== 'true') {
        window.location.href = "login.html";
    }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #121212;
            --modal-claro: #1c1c1c;
            --primary-blue: #0d6efd;
            --danger-red: #ff4444;
            --warning-yellow: #ffca28;
            --text-white: #ffffff;
            --input-bg: #3d3d3d;
            --success-green: #28a745;
            --info-cyan: #17a2b8;
        }

        body { background-color: var(--bg-dark); color: var(--text-white); padding-bottom: 220px; font-family: sans-serif; }
        
        .user-logged-info { background: var(--primary-blue); color: white; font-size: 0.75rem; text-align: center; padding: 4px; font-weight: bold; text-transform: uppercase; }
        .header-data { background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--primary-blue); text-align: center; }
        .data-texto { font-size: 1.1rem; font-weight: bold; color: var(--warning-yellow); margin: 0; }

        .retroativo-container { background: #111; padding: 8px; border-bottom: 1px solid #333; display: none; align-items: center; justify-content: center; gap: 10px; }
        .input-retroativo { background: #333; color: white; border: 1px solid var(--primary-blue); border-radius: 5px; padding: 2px 8px; font-size: 0.85rem; }

        .periodo-selector { background: #222; padding: 10px; border-bottom: 1px solid #333; display: none; justify-content: center; gap: 10px; }
        .btn-periodo { border: 1px solid var(--primary-blue); color: var(--primary-blue); background: transparent; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .btn-periodo.active { background: var(--primary-blue); color: white; }

        .nav-tabs { border-bottom: 1px solid #333; justify-content: center; background: #000; }
        .nav-link { color: #888 !important; border: none !important; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; padding: 12px 15px; }
        .nav-link.active { color: var(--primary-blue) !important; background: transparent !important; border-bottom: 3px solid var(--primary-blue) !important; }

        .member-card { background-color: var(--card-bg); border: 1px solid #333; margin: 8px 12px; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; }
        .member-main-row { display: flex; align-items: center; width: 100%; gap: 10px; }
        
        .photo-frame { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary-blue); overflow: hidden; flex-shrink: 0; background: #222; display: flex; align-items: center; justify-content: center; position: relative; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; }
        .photo-frame i { font-size: 1.8rem; color: #555; position: absolute; z-index: 1; }

        .member-info { flex: 1; min-width: 0; }
        .member-name { font-size: 0.9rem; font-weight: bold; color: var(--text-white); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .tag-container { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-top: 4px; }
        .badge-grupo { background-color: var(--warning-yellow); color: #000; font-size: 0.6rem; font-weight: bold; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
        .badge-funcao { font-size: 0.6rem; color: var(--primary-blue); text-transform: uppercase; border: 1px solid var(--primary-blue); padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        .badge-dizimista { font-size: 0.55rem; background-color: var(--success-green); color: white; padding: 1px 4px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge-pendente { font-size: 0.55rem; background-color: var(--danger-red); color: white; padding: 1px 4px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge-semrenda { font-size: 0.55rem; background-color: var(--info-cyan); color: white; padding: 1px 4px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge-seminario { font-size: 0.55rem; border: 1px solid var(--warning-yellow); color: var(--warning-yellow); padding: 0px 4px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }

        .btn-call { width: 40px; height: 38px; border: 1px solid #444; background: transparent; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn-p { color: var(--primary-blue); border-color: var(--primary-blue); border-radius: 6px 0 0 6px; }
        .btn-f { color: var(--danger-red); border-color: var(--danger-red); border-radius: 0; }
        .btn-fj { color: var(--warning-yellow); border-color: var(--warning-yellow); border-radius: 0 6px 6px 0; }
        
        .btn-p.active { background-color: var(--primary-blue) !important; color: white !important; }
        .btn-f.active { background-color: var(--danger-red) !important; color: white !important; }
        .btn-fj.active { background-color: var(--warning-yellow) !important; color: black !important; }

        .btn-update-inline { display: none; margin-top: 10px; width: 100%; font-size: 0.75rem; font-weight: bold; padding: 4px; border-radius: 6px; }
        .btn-edit { color: #555; border: none; background: transparent; font-size: 1.1rem; cursor: pointer; }
        
        .btn-float { position: fixed; bottom: 180px; right: 15px; width: 55px; height: 55px; border-radius: 50%; background: var(--primary-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; border: 2px solid #000; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .navbar-custom { background-color: #000 !important; border-top: 1px solid #222; z-index: 1100; }
        .admin-only { display: none; }
        .bottom-save-bar { position: fixed; bottom: 65px; left: 0; width: 100%; padding: 10px; background: #1a1a1a; border-top: 1px solid #333; z-index: 1050; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .modal-content { background-color: var(--modal-claro) !important; border: 2px solid var(--primary-blue) !important; border-radius: 15px !important; color: var(--text-white) !important; }
        .modal-header { border-bottom: 1px solid #333 !important; }
        .modal-title { color: var(--warning-yellow) !important; }
        .modal-body input.form-control { color: #ffffff !important; background-color: var(--input-bg) !important; border: 1px solid #555 !important; }
        .form-check-input:checked { background-color: var(--success-green); border-color: var(--success-green); }

        /* Estilos Gestão */
        .gestao-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; margin: 10px; padding: 12px; }
        .gestao-label { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: block; }
        .gestao-input { background: #222; border: 1px solid #444; color: white; font-size: 0.8rem; padding: 5px; border-radius: 5px; width: 100%; }
        .btn-toggle-gestao { padding: 6px 8px; font-size: 0.7rem; font-weight: bold; border-radius: 5px; width: 100%; margin-top: 5px; border: none; transition: 0.2s; }
        .btn-toggle-ok { background-color: var(--success-green); color: white; }
        .btn-toggle-pendente { background-color: var(--danger-red); color: white; }
        .btn-toggle-semrenda { background-color: var(--info-cyan); color: white; }
        .btn-toggle-off { background-color: #333; color: #888; }
        .seminario-item { background: #252525; padding: 5px 8px; border-radius: 6px; margin-bottom: 5px; font-size: 0.75rem; border-left: 3px solid var(--warning-yellow); display: flex; justify-content: space-between; align-items: center; }
        .seminario-local { font-weight: bold; color: var(--primary-blue); }
        .report-table { font-size: 0.75rem; color: white; width: 100%; }
        .report-table th { color: var(--warning-yellow); border-bottom: 1px solid #444; padding: 5px; }
        .report-table td { padding: 5px; border-bottom: 1px solid #222; }
        .info-estatica { background: #222; color: var(--warning-yellow); border: 1px solid #444; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; display: block; }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove, query, orderBy, getDocs, where, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEMfA8_6LAbvanYwXE_6KcO0WQWoI5nSQ",
        authDomain: "chamada-membros.firebaseapp.com",
        projectId: "chamada-membros",
        storageBucket: "chamada-membros.firebasestorage.app",
        messagingSenderId: "787711011979",
        appId: "1:787711011979:web:0fa4c2efa8c4a2f2feb88e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const dataHoje = new Date();
    let dataSelecionadaISO = dataHoje.toISOString().split('T')[0];
    const perfil = sessionStorage.getItem('perfil_maranata');
    const meuNome = localStorage.getItem('usuario_maranata') || "OPERADOR";
    
    let periodoAtual = "";
    let nomesComFuncao = []; 
    let registrosNoBanco = {};
    let registrosTemporarios = {};
    let cacheMembros = [];

    document.getElementById('labelPerfilUser').innerText = perfil === 'admin' ? "ADMINISTRADOR" : "DIÁCONO";
    document.getElementById('inputDataChamada').value = dataSelecionadaISO;

    function limparParaFoto(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    }

    function gerarTentativasDeFoto(nome, fotoCadastrada) {
        const limpar = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        const originalLimpo = limpar(nome);
        const partes = originalLimpo.split(" ");
        
        const tentativas = [];
        if(fotoCadastrada) tentativas.push(fotoCadastrada);
        
        tentativas.push(originalLimpo + ".jpg");
        tentativas.push(partes[0] + " " + partes[partes.length-1] + ".jpg");
        tentativas.push(partes[0] + ".jpg");
        
        if(originalLimpo.includes(".")) {
            tentativas.push(originalLimpo.replace(/\./g, "") + ".jpg");
        }
        
        return [...new Set(tentativas)];
    }

    window.proximaTentativaDeFoto = function(img) {
        const lista = JSON.parse(img.dataset.tentativas || "[]");
        const atualIdx = parseInt(img.dataset.idx || "0");
        
        if (atualIdx < lista.length - 1) {
            const novoIdx = atualIdx + 1;
            img.dataset.idx = novoIdx;
            img.src = `fotos/${lista[novoIdx]}`;
        } else {
            img.style.display = 'none';
        }
    };

    function verificarTravaData() {
        const temPendencias = Object.keys(registrosTemporarios).length > 0;
        const input = document.getElementById('inputDataChamada');
        if(input) input.disabled = temPendencias;
    }

    function atualizarLabelsData(dataISO) {
        const d = new Date(dataISO + 'T12:00:00');
        document.getElementById('dataTopo').innerText = d.toLocaleDateString('pt-BR');
        document.getElementById('exibirData').innerText = d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
        
        const ehDomingo = d.getDay() === 0;
        const seletor = document.getElementById('seletorDomingo');
        
        if (ehDomingo) {
            seletor.style.display = 'flex';
            if(!periodoAtual) mudarPeriodo('EBD');
        } else {
            seletor.style.display = 'none';
            periodoAtual = "";
        }
    }

    document.getElementById('inputDataChamada').onchange = (e) => {
        dataSelecionadaISO = e.target.value;
        atualizarLabelsData(dataSelecionadaISO);
        colorirBotoes();
    };

    async function colorirBotoes() {
        const idColecao = periodoAtual ? `chamada_${periodoAtual}` : "chamada_diaria";
        const q = query(collection(db, idColecao), where("data", "==", dataSelecionadaISO));
        let snap = await getDocs(q);

        const d = new Date(dataSelecionadaISO + 'T12:00:00');
        if (d.getDay() === 0 && snap.empty && periodoAtual === 'EBD') {
            const qGeral = query(collection(db, "chamada_diaria"), where("data", "==", dataSelecionadaISO));
            snap = await getDocs(qGeral);
        }
        
        document.querySelectorAll('.btn-call').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.btn-update-inline').forEach(btn => btn.style.display = 'none');
        registrosNoBanco = {};
        registrosTemporarios = {}; 
        verificarTravaData();

        snap.forEach(docSnap => {
            const d = docSnap.data();
            const idMembro = d.nome.replace(/\s+/g, '');
            registrosNoBanco[d.nome] = d.status;
            
            const container = document.getElementById(`group-${idMembro}`);
            if (container) {
                if (d.status === "Presente") container.querySelector('.btn-p').classList.add('active');
                if (d.status === "Ausente") container.querySelector('.btn-f').classList.add('active');
                if (d.status === "Justificada") container.querySelector('.btn-fj').classList.add('active');
            }
        });
    }

    window.mudarPeriodo = (periodo) => {
        periodoAtual = periodo;
        document.querySelectorAll('.btn-periodo').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById(`btn${periodo}`);
        if(btn) btn.classList.add('active');
        colorirBotoes(); 
    };

    if (perfil === 'admin') {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        const filtro = document.getElementById('containerFiltroData');
        if(filtro) filtro.style.display = 'flex';
    }

    atualizarLabelsData(dataSelecionadaISO);

    onSnapshot(query(collection(db, "membros"), orderBy("nome", "asc")), (membroSnapshot) => {
        const listaCom = document.getElementById('listaComFuncao');
        const listaSem = document.getElementById('listaSemFuncao');
        const listaGestao = document.getElementById('listaGestao');
        
        listaCom.innerHTML = ""; listaSem.innerHTML = ""; listaGestao.innerHTML = "";
        nomesComFuncao = []; 
        cacheMembros = [];

        const mesFiltro = document.getElementById('filtroMesDizimo').value;
        const anoFiltro = document.getElementById('filtroAnoDizimo').value;
        const chaveDizimo = `${mesFiltro}_${anoFiltro}`;

        membroSnapshot.forEach(docSnap => {
            const m = docSnap.data();
            cacheMembros.push(m);
            const temFuncao = m.funcoes && m.funcoes.length > 0;
            if(temFuncao) nomesComFuncao.push(m.nome);
            const idMembro = m.nome.replace(/\s+/g, '');
            
            const htmlChamada = renderCardChamada(m, idMembro, temFuncao);
            if(temFuncao) listaCom.innerHTML += htmlChamada;
            else listaSem.innerHTML += htmlChamada;

            if(perfil === 'admin') {
                const statusDizimo = m.historicoDizimos ? m.historicoDizimos[chaveDizimo] : null;
                const numSeminarios = m.historicoSeminarios ? m.historicoSeminarios.length : 0;
                
                let btnClass = "btn-toggle-off";
                let btnText = "PENDENTE / MARCAR";
                if(statusDizimo === "OK") { btnClass = "btn-toggle-ok"; btnText = "DÍZIMO OK"; }
                if(statusDizimo === "PENDENTE") { btnClass = "btn-toggle-pendente"; btnText = "NÃO OFERTADO"; }
                if(statusDizimo === "SEM_RENDA") { btnClass = "btn-toggle-semrenda"; btnText = "NÃO TEM RENDA"; }

                listaGestao.innerHTML += `
                    <div class="gestao-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-1 fw-bold">${m.nome}</h6>
                                <span class="badge bg-secondary mb-2" style="font-size: 0.6rem;">${m.grupo || 'SEM GRUPO'}</span>
                            </div>
                            <div class="text-end">
                                <button class="btn btn-sm btn-outline-warning" onclick="window.abrirEditor('${m.nome}')">
                                    <i class="bi bi-pencil-square"></i> EDITAR
                                </button>
                            </div>
                        </div>
                        <div class="row g-2 mt-1">
                            <div class="col-6">
                                <span class="gestao-label">Controle Dízimo (${mesFiltro}/${anoFiltro})</span>
                                <button class="btn-toggle-gestao ${btnClass}" 
                                        onclick="window.proximoStatusDizimo('${m.nome}', '${chaveDizimo}', '${statusDizimo}')">
                                    ${btnText}
                                </button>
                            </div>
                            <div class="col-6">
                                <span class="gestao-label">Seminários (${numSeminarios})</span>
                                <div style="max-height: 120px; overflow-y: auto;">
                                    ${renderSeminarios(m.nome, m.historicoSeminarios)}
                                </div>
                            </div>
                        </div>
                    </div>`;
            }
        });

        if (window.membroSendoEditado) {
           const mEdit = cacheMembros.find(x => x.nome === window.membroSendoEditado);
           if (mEdit) {
               renderizarSeminariosNoModal(mEdit.historicoSeminarios || []);
               const txt = mEdit.ultimoSeminario;
               document.getElementById('labelUltimoSeminario').innerText = (txt && txt.trim() !== "") ? txt : "SEM SEMINÁRIOS";
           }
        }

        colorirBotoes();
    });

    function renderCardChamada(m, idMembro, temFuncao) {
        const tentativas = gerarTentativasDeFoto(m.nome, m.foto);
        const fotoInicial = `fotos/${tentativas[0]}`;
        const dizimoAtualChave = `${(dataHoje.getMonth()+1).toString().padStart(2,'0')}_${dataHoje.getFullYear()}`;
        const statusDizimo = m.historicoDizimos ? m.historicoDizimos[dizimoAtualChave] : null;
        const numSem = m.historicoSeminarios ? m.historicoSeminarios.length : 0;

        let badgeDizimo = "";
        if(statusDizimo === "OK") badgeDizimo = `<span class="badge-dizimista">DÍZIMO OK</span>`;
        else if(statusDizimo === "PENDENTE") badgeDizimo = `<span class="badge-pendente">NÃO OFERTADO</span>`;
        else if(statusDizimo === "SEM_RENDA") badgeDizimo = `<span class="badge-semrenda">NÃO TEM RENDA</span>`;

        return `
            <div class="member-card">
                <div class="member-main-row">
                    <button class="btn-edit" onclick="abrirEditor('${m.nome}')"><i class="bi bi-pencil-square"></i></button>
                    <div class="photo-frame">
                        <i class="bi bi-person-circle"></i>
                        <img src="${fotoInicial}" 
                             data-tentativas='${JSON.stringify(tentativas)}' 
                             data-idx="0"
                             onerror="proximaTentativaDeFoto(this)" 
                             onload="this.previousElementSibling.style.display='none';">
                    </div>
                    <div class="member-info">
                        <span class="member-name">${m.nome}</span>
                        <div class="tag-container">
                            ${m.grupo ? `<span class="badge-grupo">${m.grupo}</span>` : ''}
                            ${m.funcoes ? m.funcoes.map(f => `<span class="badge-funcao">${f}</span>`).join('') : ''}
                            ${perfil === 'admin' && numSem > 0 ? `<span class="badge-seminario">${numSem} SEM.</span>` : ''}
                            ${perfil === 'admin' ? badgeDizimo : ''}
                        </div>
                    </div>
                    <div class="d-flex" id="group-${idMembro}">
                        <button onclick="prepararChamada('${m.nome}', 'P')" class="btn-call btn-p">P</button>
                        <button onclick="prepararChamada('${m.nome}', 'F')" class="btn-call btn-f">F</button>
                        <button onclick="prepararChamada('${m.nome}', 'FJ')" class="btn-call btn-fj">FJ</button>
                    </div>
                </div>
                <button id="btnUp-${idMembro}" class="btn btn-warning btn-update-inline" onclick="confirmarAtualizacao('${m.nome}')">
                    <i class="bi bi-arrow-repeat"></i> ATUALIZAR CHAMADA DESTE MEMBRO
                </button>
            </div>`;
    }

    function renderSeminarios(nomeMembro, lista) {
        if(!lista || lista.length === 0) return '<p class="m-0 text-white-50" style="font-size: 0.6rem;">Nenhum registro</p>';
        return lista.map((s, index) => `
            <div class="seminario-item">
                <div>
                    <span class="seminario-local">[${s.local}]</span> ${s.titulo}
                    <div class="text-white-50" style="font-size: 0.6rem;">${s.data.split('-').reverse().join('/')}</div>
                </div>
            </div>
        `).join('');
    }

    window.recarregarGestao = () => { colorirBotoes(); };

    window.proximoStatusDizimo = async (nome, chave, statusAtual) => {
        let novoStatus = "OK";
        if(statusAtual === "OK") novoStatus = "PENDENTE";
        else if(statusAtual === "PENDENTE") novoStatus = "SEM_RENDA";
        else if(statusAtual === "SEM_RENDA") novoStatus = null;

        await updateDoc(doc(db, "membros", nome), {
            [`historicoDizimos.${chave}`]: novoStatus
        });
    };

    window.abrirRelatorioGestao = () => {
        const mes = document.getElementById('filtroMesDizimo').value;
        const ano = document.getElementById('filtroAnoDizimo').value;
        const chave = `${mes}_${ano}`;
        
        document.getElementById('tituloRelatorioGestao').innerText = `Período: ${mes}/${ano}`;
        const corpo = document.getElementById('corpoRelatorioGestao');
        corpo.innerHTML = "";

        cacheMembros.forEach(m => {
            const statusDizimo = m.historicoDizimos ? m.historicoDizimos[chave] : "-";
            const listaSem = m.historicoSeminarios ? m.historicoSeminarios.map(s => `${s.titulo} (${s.local})`).join(', ') : "-";
            const listaFuncoes = m.funcoes ? m.funcoes.join(' | ') : "-";
            
            let statusHTML = `<span class="text-white-50">Não Info.</span>`;
            if(statusDizimo === "OK") statusHTML = `<span class="text-success fw-bold">Dízimo OK</span>`;
            if(statusDizimo === "PENDENTE") statusHTML = `<span class="text-danger fw-bold">Não Ofertado</span>`;
            if(statusDizimo === "SEM_RENDA") statusHTML = `<span class="text-info fw-bold">Sem Renda</span>`;

            corpo.innerHTML += `
                <tr>
                    <td class="fw-bold">${m.nome}</td>
                    <td><span class="text-info">${listaFuncoes}</span></td>
                    <td>${m.grupo || '-'}</td>
                    <td>${statusHTML}</td>
                    <td style="max-width: 250px; font-size: 0.7rem;">${listaSem}</td>
                </tr>`;
        });

        new bootstrap.Modal(document.getElementById('modalRelatorioGestao')).show();
    };

    window.abrirSeminarioPeloModal = () => {
        const modalEdicao = bootstrap.Modal.getInstance(document.getElementById('modalEditarMembro'));
        if(modalEdicao) modalEdicao.hide();
        window.abrirModalSeminario(window.membroSendoEditado);
    };

    window.abrirModalSeminario = (nome) => {
        window.membroSeminarioAtual = nome;
        document.getElementById('nomeMembroSem').innerText = nome;
        document.getElementById('indexSemEdit').value = ""; 
        document.getElementById('tituloSem').value = "";
        document.getElementById('dataSem').value = "";
        new bootstrap.Modal(document.getElementById('modalSeminario')).show();
    };

    window.fecharModalSeminario = () => {
        const modalSem = bootstrap.Modal.getInstance(document.getElementById('modalSeminario'));
        if(modalSem) modalSem.hide();
        if (window.membroSendoEditado) {
            new bootstrap.Modal(document.getElementById('modalEditarMembro')).show();
        }
    };

    async function sincronizarUltimoSeminario(nomeMembro, listaSeminarios) {
        let ultimoTexto = "SEM SEMINÁRIOS"; 
        if (listaSeminarios && listaSeminarios.length > 0) {
            const ordenados = [...listaSeminarios].sort((a, b) => new Date(b.data) - new Date(a.data));
            ultimoTexto = ordenados[0].titulo.toUpperCase();
        }
        await updateDoc(doc(db, "membros", nomeMembro), { ultimoSeminario: ultimoTexto });
        const label = document.getElementById('labelUltimoSeminario');
        if (label && window.membroSendoEditado === nomeMembro) {
            label.innerText = ultimoTexto;
        }
    }

    window.excluirSeminario = async (nome, index) => {
        if(confirm("Deseja realmente apagar este seminário?")) {
            const m = cacheMembros.find(x => x.nome === nome);
            if (!m) return;
            const novaLista = [...m.historicoSeminarios];
            novaLista.splice(index, 1);
            await updateDoc(doc(db, "membros", nome), { historicoSeminarios: novaLista });
            await sincronizarUltimoSeminario(nome, novaLista);
        }
    };

    document.getElementById('btnSalvarSeminario').onclick = async () => {
        const local = document.getElementById('localSem').value;
        const titulo = document.getElementById('tituloSem').value;
        const data = document.getElementById('dataSem').value;
        const indexEdit = document.getElementById('indexSemEdit').value;
        if(!titulo || !data) { alert("Preencha título e data!"); return; }
        const m = cacheMembros.find(x => x.nome === window.membroSendoEditado);
        let novaLista = m.historicoSeminarios ? [...m.historicoSeminarios] : [];
        if(indexEdit === "") { novaLista.push({local, titulo, data}); }
        else { novaLista[indexEdit] = {local, titulo, data}; }
        await updateDoc(doc(db, "membros", window.membroSendoEditado), { historicoSeminarios: novaLista });
        await sincronizarUltimoSeminario(window.membroSendoEditado, novaLista);
        fecharModalSeminario();
    };

    window.prepararChamada = (nome, statusAbv) => {
        const idMembro = nome.replace(/\s+/g, '');
        const container = document.getElementById(`group-${idMembro}`);
        const statusTexto = statusAbv === 'P' ? "Presente" : (statusAbv === 'F' ? "Ausente" : "Justificada");
        container.querySelectorAll('.btn-call').forEach(btn => btn.classList.remove('active'));
        if(statusAbv === 'P') container.querySelector('.btn-p').classList.add('active');
        if(statusAbv === 'F') container.querySelector('.btn-f').classList.add('active');
        if(statusAbv === 'FJ') container.querySelector('.btn-fj').classList.add('active');
        registrosTemporarios[nome] = statusTexto;
        if (registrosNoBanco[nome]) {
            const upBtn = document.getElementById(`btnUp-${idMembro}`);
            if(upBtn) upBtn.style.display = 'block';
        }
        verificarTravaData();
    };

    window.confirmarAtualizacao = async (nome) => {
        const idColecao = periodoAtual ? `chamada_${periodoAtual}` : "chamada_diaria";
        await setDoc(doc(db, idColecao, `${dataSelecionadaISO}_${nome}`), { nome, data: dataSelecionadaISO, status: registrosTemporarios[nome], operador: meuNome });
        alert("CHAMADA ATUALIZADA!");
        delete registrosTemporarios[nome];
        verificarTravaData();
        colorirBotoes();
    };

    document.getElementById('btnFinalizarChamada').onclick = async () => {
        const idColecao = periodoAtual ? `chamada_${periodoAtual}` : "chamada_diaria";
        const totalMarcadosNaTela = { ...registrosNoBanco, ...registrosTemporarios };
        const chamadasFeitasComFuncao = nomesComFuncao.filter(nome => totalMarcadosNaTela[nome]);
        if (chamadasFeitasComFuncao.length < nomesComFuncao.length) {
            alert(`BLOQUEADO: FALTA FAZER A CHAMADA DE ${nomesComFuncao.length - chamadasFeitasComFuncao.length} MEMBRO(S) COM FUNÇÃO!`);
            return;
        }
        if(confirm(`Salvar chamada de ${dataSelecionadaISO}?`)) {
            const batch = writeBatch(db);
            Object.keys(registrosTemporarios).forEach(nome => {
                batch.set(doc(db, idColecao, `${dataSelecionadaISO}_${nome}`), { nome, data: dataSelecionadaISO, status: registrosTemporarios[nome], operador: meuNome });
            });
            await batch.commit();
            alert("SUCESSO!");
            registrosTemporarios = {};
            verificarTravaData();
            colorirBotoes();
        }
    };

    window.abrirEditor = async (nome) => {
        window.membroSendoEditado = nome;
        document.getElementById('editNomeMembro').innerText = nome;
        const m = cacheMembros.find(x => x.nome === nome);
        if(m) {
            document.getElementById('inputMudarGrupo').value = m.grupo || "";
            document.getElementById('checkDizimista').checked = m.dizimista || false;
            document.getElementById('labelUltimoSeminario').innerText = m.ultimoSeminario || "SEM SEMINÁRIOS";
            renderizarTagsFuncao(m.funcoes || []);
            renderizarSeminariosNoModal(m.historicoSeminarios || []);
        }
        new bootstrap.Modal(document.getElementById('modalEditarMembro')).show();
    };

    function renderizarSeminariosNoModal(lista) {
        const container = document.getElementById('listaSeminariosNoModal');
        if (!lista || lista.length === 0) {
            container.innerHTML = '<p class="text-white-50 small">Nenhum</p>';
            return;
        }
        container.innerHTML = lista.map((s, index) => `
            <div class="seminario-item">
                <div>[${s.local}] ${s.titulo}</div>
                <div class="d-flex gap-2">
                    <i class="bi bi-trash-fill text-danger" style="cursor:pointer" onclick="window.excluirSeminario(window.membroSendoEditado, ${index})"></i>
                </div>
            </div>`).join('');
    }

    function renderizarTagsFuncao(fs) {
        document.getElementById('containerTagsFuncao').innerHTML = fs.map(f => `<span class="badge-funcao">${f} <i class="bi bi-x-circle-fill text-danger ms-2" onclick="removerFuncao('${f}')"></i></span>`).join('');
    }

    window.removerFuncao = async (f) => { if(confirm(`Remover ${f}?`)) await updateDoc(doc(db, "membros", window.membroSendoEditado), { funcoes: arrayRemove(f) }); };
    document.getElementById('btnSalvarGrupo').onclick = async () => { await updateDoc(doc(db, "membros", window.membroSendoEditado), { grupo: document.getElementById('inputMudarGrupo').value.toUpperCase() }); alert("OK!"); };
    document.getElementById('btnAddFuncao').onclick = async () => { const f = document.getElementById('inputNovaFuncao').value.toUpperCase(); if(f) await updateDoc(doc(db, "membros", window.membroSendoEditado), { funcoes: arrayUnion(f) }); };
    document.getElementById('btnSalvarInfoExtra').onclick = async () => { await updateDoc(doc(db, "membros", window.membroSendoEditado), { dizimista: document.getElementById('checkDizimista').checked }); alert("SALVO!"); };

    // --- CONCERTO NA LIMPEZA INDIVIDUAL ---
    document.getElementById('btnLimparChamadaDia').onclick = async () => {
        if(confirm(`Limpar chamada de ${window.membroSendoEditado}?`)) {
            // ID correto do documento: Data_Nome
            const idDoc = `${dataSelecionadaISO}_${window.membroSendoEditado}`;
            // Identifica se a coleção é diária ou de algum período de domingo
            const idCol = periodoAtual ? `chamada_${periodoAtual}` : "chamada_diaria";
            
            try { 
                await deleteDoc(doc(db, idCol, idDoc)); 
                alert("CHAMADA DO MEMBRO LIMPA!"); 
                bootstrap.Modal.getInstance(document.getElementById('modalEditarMembro')).hide(); 
                colorirBotoes(); 
            } catch(e) { 
                console.error(e);
                alert("Erro ao limpar chamada."); 
            }
        }
    };

    document.getElementById('btnExcluirMembro').onclick = async () => {
        if(confirm(`Excluir ${window.membroSendoEditado}?`)) {
            await deleteDoc(doc(db, "membros", window.membroSendoEditado));
            bootstrap.Modal.getInstance(document.getElementById('modalEditarMembro')).hide();
        }
    };

    document.getElementById('btnSalvarNovoMembro').onclick = async () => {
        const n = document.getElementById('novoNomeMembro').value.toUpperCase();
        if(n) {
            await setDoc(doc(db, "membros", n), { 
                nome: n, grupo: document.getElementById('novoGrupoMembro').value.toUpperCase(), 
                funcoes: [], foto: document.getElementById('novaFotoMembro').value || "",
                historicoDizimos: {}, historicoSeminarios: [], ultimoSeminario: "SEM SEMINÁRIOS"
            });
            alert("ADICIONADO!");
            bootstrap.Modal.getInstance(document.getElementById('modalNovoMembro')).hide();
        }
    };

    colorirBotoes();
</script>
</body>
</html>
