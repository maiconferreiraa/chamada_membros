<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chamada Maranata</title>

    <script>
    if (sessionStorage.getItem('logado_maranata') !== 'true') {
        window.location.href = "login.html";
    }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #121212;
            --modal-claro: #1c1c1c;
            --primary-blue: #0d6efd;
            --danger-red: #ff4444;
            --warning-yellow: #ffca28;
            --text-white: #ffffff;
            --input-bg: #3d3d3d;
            --success-green: #28a745;
            --info-cyan: #17a2b8;
        }

        body { background-color: var(--bg-dark); color: var(--text-white); padding-bottom: 220px; font-family: sans-serif; }
        .user-logged-info { background: var(--primary-blue); color: white; font-size: 0.75rem; text-align: center; padding: 4px; font-weight: bold; text-transform: uppercase; }
        .header-data { background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--primary-blue); text-align: center; }
        .data-texto { font-size: 1.1rem; font-weight: bold; color: var(--warning-yellow); margin: 0; }
        .retroativo-container { background: #111; padding: 8px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-retroativo { background: #333; color: white; border: 1px solid var(--primary-blue); border-radius: 5px; padding: 2px 8px; font-size: 0.85rem; }
        .periodo-selector { background: #222; padding: 10px; border-bottom: 1px solid #333; display: none; justify-content: center; gap: 10px; }
        .btn-periodo { border: 1px solid var(--primary-blue); color: var(--primary-blue); background: transparent; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .btn-periodo.active { background: var(--primary-blue); color: white; }
        
        .nav-tabs { border-bottom: 1px solid #333; justify-content: center; background: #000; }
        .nav-link { color: #888 !important; border: none !important; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; padding: 12px 15px; }
        .nav-link.active { color: var(--primary-blue) !important; background: transparent !important; border-bottom: 3px solid var(--primary-blue) !important; }

        .member-card { background-color: var(--card-bg); border: 1px solid #333; margin: 8px 12px; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; }
        .member-main-row { display: flex; align-items: center; width: 100%; gap: 10px; }
        .photo-frame { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary-blue); overflow: hidden; flex-shrink: 0; background: #222; display: flex; align-items: center; justify-content: center; position: relative; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .member-info { flex: 1; min-width: 0; }
        .member-name { font-size: 0.9rem; font-weight: bold; color: var(--text-white); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tag-container { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-top: 4px; }
        .badge-grupo { background-color: var(--warning-yellow); color: #000; font-size: 0.6rem; font-weight: bold; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
        .badge-funcao { font-size: 0.6rem; color: var(--primary-blue); text-transform: uppercase; border: 1px solid var(--primary-blue); padding: 1px 4px; border-radius: 4px; font-weight: bold; }
        
        .btn-call { width: 40px; height: 38px; border: 1px solid #444; background: transparent; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn-p { color: var(--primary-blue); border-color: var(--primary-blue); border-radius: 6px 0 0 6px; }
        .btn-f { color: var(--danger-red); border-color: var(--danger-red); border-radius: 0; }
        .btn-fj { color: var(--warning-yellow); border-color: var(--warning-yellow); border-radius: 0 6px 6px 0; }
        .btn-p.active { background-color: var(--primary-blue) !important; color: white !important; }
        .btn-f.active { background-color: var(--danger-red) !important; color: white !important; }
        .btn-fj.active { background-color: var(--warning-yellow) !important; color: black !important; }
        .btn-edit { color: #555; border: none; background: transparent; font-size: 1.1rem; cursor: pointer; }
        
        .navbar-custom { background-color: #000 !important; border-top: 1px solid #222; z-index: 1100; }
        .admin-only { display: none; }
        .bottom-save-bar { position: fixed; bottom: 75px; left: 0; width: 100%; padding: 10px; background: #1a1a1a; border-top: 1px solid #333; z-index: 1050; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .modal-content { background-color: var(--modal-claro) !important; border: 2px solid var(--primary-blue) !important; border-radius: 15px !important; color: var(--text-white) !important; }

        .status-ok { color: var(--success-green) !important; font-weight: bold; }
        .status-no { color: var(--danger-red) !important; font-weight: bold; }
        .status-sr { color: var(--info-cyan) !important; font-weight: bold; }
        .status-null { color: #666 !important; font-style: italic; }

        .report-table { font-size: 0.75rem; color: white; width: 100%; border-collapse: collapse; }
        .report-table th { color: var(--warning-yellow); border-bottom: 1px solid #444; padding: 5px; }
        .report-table td { padding: 5px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="user-logged-info">
    <i class="bi bi-person-fill"></i> <span id="labelPerfilUser"></span> | <i class="bi bi-calendar3"></i> <span id="dataTopo"></span>
</div>

<div class="retroativo-container admin-only" id="containerFiltroData">
    <span class="small fw-bold text-info">LANCAR RETROATIVO:</span>
    <input type="date" id="inputDataChamada" class="input-retroativo">
</div>

<div class="header-data">
    <p id="exibirData" class="data-texto"></p>
    <p class="small text-white-50 m-0">CHAMADA MARANATA</p>
</div>

<div id="seletorDomingo" class="periodo-selector">
    <button id="btnEBD" class="btn-periodo" onclick="mudarPeriodo('EBD')">MANHA (EBD)</button>
    <button id="btnNOITE" class="btn-periodo" onclick="mudarPeriodo('NOITE')">CULTO A NOITE</button>
</div>

<ul class="nav nav-tabs sticky-top" id="maranataTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#comFuncao" type="button">Com Funcao</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#semFuncao" type="button">Geral</button></li>
    <li class="nav-item admin-only"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#gestaoTab" type="button">Gestao</button></li>
</ul>

<div class="tab-content" id="maranataTabContent">
    <div class="tab-pane fade show active" id="comFuncao" role="tabpanel"><div id="listaComFuncao" class="mt-2"></div></div>
    <div class="tab-pane fade" id="semFuncao" role="tabpanel"><div id="listaSemFuncao" class="mt-2"></div></div>
    
    <div class="tab-pane fade" id="gestaoTab" role="tabpanel">
        <div id="listaGestao"></div>
    </div>
</div>

<div class="bottom-save-bar">
    <button id="btnFinalizarChamada" class="btn btn-success w-75 fw-bold shadow mb-2">
        <i class="bi bi-check-circle-fill"></i> FINALIZAR CHAMADA
    </button>
    <button id="btnLimparTudo" class="btn btn-outline-danger btn-sm w-75 fw-bold admin-only" onclick="window.limparTodaChamadaDia()">
        <i class="bi bi-trash3-fill"></i> LIMPAR TODA CHAMADA DO DIA
    </button>
</div>

<div class="modal fade" id="modalRelatorioGestao" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-warning">Relatorio Administrativo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="report-table">
                        <thead><tr><th>Membro</th><th>Funcao</th><th>Dizimo</th><th>Seminarios</th></tr></thead>
                        <tbody id="corpoRelatorioGestao"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<nav class="navbar fixed-bottom navbar-custom py-2">
    <div class="container d-flex justify-content-around">
        <a href="index.html" class="text-primary text-center text-decoration-none"><i class="bi bi-people-fill fs-4 d-block"></i><span style="font-size: 0.7rem;">Chamada</span></a>
        <a href="relatorio.html" class="text-white-50 text-center text-decoration-none"><i class="bi bi-file-bar-graph fs-4 d-block"></i><span style="font-size: 0.7rem;">Relatorios</span></a>
        <a href="#" onclick="sessionStorage.clear(); window.location.href='login.html';" class="text-danger text-center text-decoration-none"><i class="bi bi-box-arrow-right fs-4 d-block"></i><span style="font-size: 0.7rem;">Sair</span></a>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEMfA8_6LAbvanYwXE_6KcO0WQWoI5nSQ",
        authDomain: "chamada-membros.firebaseapp.com",
        projectId: "chamada-membros",
        storageBucket: "chamada-membros.firebasestorage.app",
        messagingSenderId: "787711011979",
        appId: "1:787711011979:web:0fa4c2efa8c4a2f2feb88e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const dataHoje = new Date();
    let dataSelecionadaISO = dataHoje.getFullYear() + '-' + String(dataHoje.getMonth() + 1).padStart(2, '0') + '-' + String(dataHoje.getDate()).padStart(2, '0');
    const perfil = sessionStorage.getItem('perfil_maranata');
    let periodoAtual = "";
    let cacheMembros = [];

    const limparTexto = (s) => s ? s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\./g, "").toUpperCase() : "";

    // LÓGICA DE CORES RESTAURADA DO SEU ÚLTIMO CÓDIGO FUNCIONAL
    window.colorirBotoes = async function() {
        const idCol = periodoAtual ? `chamada_${periodoAtual}` : "chamada_diaria";
        const q = query(collection(db, idCol), where("data", "==", dataSelecionadaISO));
        let snap = await getDocs(q);
        document.querySelectorAll('.btn-call').forEach(btn => btn.classList.remove('active'));
        snap.forEach(docSnap => {
            const d = docSnap.data();
            const idM = d.nome.replace(/\s+/g, '');
            const container = document.getElementById(`group-${idM}`);
            if (container) {
                if (d.status === "Presente") container.querySelector('.btn-p').classList.add('active');
                if (d.status === "Ausente") container.querySelector('.btn-f').classList.add('active');
                if (d.status === "Justificada") container.querySelector('.btn-fj').classList.add('active');
            }
        });
    }

    onSnapshot(query(collection(db, "membros"), orderBy("nome", "asc")), (snap) => {
        const listaCom = document.getElementById('listaComFuncao');
        const listaSem = document.getElementById('listaSemFuncao');
        listaCom.innerHTML = ""; listaSem.innerHTML = "";
        cacheMembros = [];

        snap.forEach(docSnap => {
            const m = docSnap.data(); cacheMembros.push(m);
            const idM = m.nome.replace(/\s+/g, '');
            const card = `<div class="member-card"><div class="member-main-row"><button class="btn-edit"><i class="bi bi-pencil-square"></i></button><div class="photo-frame"><i class="bi bi-person-circle"></i></div><div class="member-info"><span class="member-name">${limparTexto(m.nome)}</span><div class="tag-container">${m.grupo?`<span class="badge-grupo">${limparTexto(m.grupo)}</span>`:''}${m.funcoes?m.funcoes.map(f=>`<span class="badge-funcao">${limparTexto(f)}</span>`).join(''):''}</div></div><div class="d-flex" id="group-${idM}"><button onclick="prepararChamada('${m.nome}','P')" class="btn-call btn-p">P</button><button onclick="prepararChamada('${m.nome}','F')" class="btn-call btn-f">F</button><button onclick="prepararChamada('${m.nome}','FJ')" class="btn-call btn-fj">FJ</button></div></div></div>`;
            if(m.funcoes?.length > 0) listaCom.innerHTML += card; else listaSem.innerHTML += card;
        });
        window.colorirBotoes();
    });

    window.prepararChamada = async (nome, s) => {
        const idCol = periodoAtual ? `chamada_${periodoAtual}` : "chamada_diaria";
        const idDoc = `${dataSelecionadaISO}_${nome}`;
        const st = (s==='P')?"Presente":(s==='F')?"Ausente":"Justificada";
        await setDoc(doc(db, idCol, idDoc), { nome, status: st, data: dataSelecionadaISO });
        window.colorirBotoes();
    };

    window.limparTodaChamadaDia = async () => {
        if(confirm("Deseja apagar TODOS os registros desta data? Isso resolvera o problema de registros fantasmas.")) {
            const idCol = periodoAtual ? `chamada_${periodoAtual}` : "chamada_diaria";
            const q = query(collection(db, idCol), where("data", "==", dataSelecionadaISO));
            const snap = await getDocs(q);
            const promises = snap.docs.map(d => deleteDoc(d.ref));
            await Promise.all(promises);
            window.colorirBotoes();
            alert("Chamada limpa!");
        }
    };

    document.getElementById('btnFinalizarChamada').onclick = async () => {
        const idCol = periodoAtual ? `chamada_${periodoAtual}` : "chamada_diaria";
        const membrosComFuncao = cacheMembros.filter(m => m.funcoes && m.funcoes.length > 0);
        const q = query(collection(db, idCol), where("data", "==", dataSelecionadaISO));
        const snap = await getDocs(q);
        
        // Verifica apenas quem tem função
        const realizados = snap.docs.filter(d => membrosComFuncao.some(mc => mc.nome === d.data().nome)).length;
        
        if (realizados < membrosComFuncao.length) {
            alert(`ATENÇÃO: A chamada não está completa!\nFaltam ${membrosComFuncao.length - realizados} membros com função.`);
        } else {
            alert("CHAMADA CONCLUÍDA COM SUCESSO!");
        }
    };

    function atualizarLabelsData(dataISO) {
        const partes = dataISO.split('-');
        const d = new Date(partes[0], partes[1] - 1, partes[2], 12, 0, 0);
        document.getElementById('dataTopo').innerText = d.toLocaleDateString('pt-BR');
        document.getElementById('exibirData').innerText = limparTexto(d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' }));
        document.getElementById('seletorDomingo').style.display = d.getDay() === 0 ? 'flex' : 'none';
        window.colorirBotoes();
    }

    const inputData = document.getElementById('inputDataChamada');
    inputData.value = dataSelecionadaISO;
    inputData.onchange = (e) => { 
        dataSelecionadaISO = e.target.value; 
        atualizarLabelsData(dataSelecionadaISO);
    };

    window.mudarPeriodo = (p) => { periodoAtual = p; window.colorirBotoes(); };
    if (perfil === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    atualizarLabelsData(dataSelecionadaISO);
</script>
</body>
</html>
